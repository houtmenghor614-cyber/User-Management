<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management | Admin Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons (Professional icon library) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f9fafb;
            font-family: 'Inter', sans-serif;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #e5e7eb;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #9ca3af;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }
        
        /* Table row hover */
        .table-row-hover:hover {
            background-color: #f9fafb;
            transition: background-color 0.2s ease;
        }
        
        /* Modal animation */
        .modal-enter {
            animation: modalFade 0.2s ease-out;
        }
        
        @keyframes modalFade {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        /* Button transitions */
        .btn-transition {
            transition: all 0.2s ease;
        }
        
        /* Focus styles */
        input:focus {
            outline: none;
            ring: 2px solid #3b82f6;
            border-color: transparent;
        }
    </style>
</head>
<body>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="mb-8">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="bg-blue-600 rounded-lg p-2">
                        <i data-lucide="users" class="w-6 h-6 text-white"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-semibold text-gray-900">User Management</h1>
                        <p class="text-sm text-gray-500 mt-0.5">Manage and monitor user accounts</p>
                    </div>
                </div>
                <button id="openCreateModalBtn" class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    <span>Add User</span>
                </button>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <!-- Card 1 -->
            <div class="bg-white rounded-lg border border-gray-200 p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-500">Total Users</p>
                        <p id="totalUsersCount" class="text-3xl font-semibold text-gray-900 mt-1">0</p>
                        <p class="text-xs text-gray-400 mt-2">All registered accounts</p>
                    </div>
                    <div class="bg-blue-50 rounded-lg p-3">
                        <i data-lucide="users" class="w-6 h-6 text-blue-600"></i>
                    </div>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="bg-white rounded-lg border border-gray-200 p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-500">System Status</p>
                        <div class="flex items-center gap-2 mt-1">
                            <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                            <p class="text-sm font-medium text-gray-900">Operational</p>
                        </div>
                        <p class="text-xs text-gray-400 mt-2">API & Database active</p>
                    </div>
                    <div class="bg-green-50 rounded-lg p-3">
                        <i data-lucide="activity" class="w-6 h-6 text-green-600"></i>
                    </div>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="bg-white rounded-lg border border-gray-200 p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-500">Last Sync</p>
                        <p id="lastUpdatedTimestamp" class="text-sm font-medium text-gray-900 mt-1">—</p>
                        <p class="text-xs text-gray-400 mt-2">Auto-refresh on action</p>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-3">
                        <i data-lucide="clock" class="w-6 h-6 text-gray-600"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Users Table -->
        <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <i data-lucide="table" class="w-5 h-5 text-gray-500"></i>
                        <h2 class="text-base font-semibold text-gray-900">User Directory</h2>
                        <span id="userCountBadge" class="bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded-full">0 users</span>
                    </div>
                    <button id="refreshBtn" class="text-gray-400 hover:text-gray-600 transition-colors">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50 border-b border-gray-200">
                        <tr>
                            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                            <th class="text-right px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody" class="divide-y divide-gray-100">
                        <tr>
                            <td colspan="4" class="px-6 py-12 text-center">
                                <div class="flex flex-col items-center gap-2">
                                    <i data-lucide="loader-circle" class="w-8 h-8 text-gray-400 animate-spin"></i>
                                    <p class="text-sm text-gray-500">Loading users...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Create User Modal -->
    <div id="createModal" class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md mx-4 modal-enter">
            <div class="flex items-center justify-between p-5 border-b border-gray-200">
                <div class="flex items-center gap-2">
                    <i data-lucide="user-plus" class="w-5 h-5 text-blue-600"></i>
                    <h3 class="text-lg font-semibold text-gray-900">Create New User</h3>
                </div>
                <button id="closeCreateModalBtn" class="text-gray-400 hover:text-gray-600">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <form id="createUserForm" class="p-5 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text" id="createName" required 
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                           placeholder="Enter full name">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="createEmail" required 
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                           placeholder="user@example.com">
                </div>
                <div class="flex justify-end gap-3 pt-3">
                    <button type="button" id="cancelCreateBtn" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                        Cancel
                    </button>
                    <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors">
                        Create User
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div id="editModal" class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md mx-4 modal-enter">
            <div class="flex items-center justify-between p-5 border-b border-gray-200">
                <div class="flex items-center gap-2">
                    <i data-lucide="user-edit" class="w-5 h-5 text-orange-600"></i>
                    <h3 class="text-lg font-semibold text-gray-900">Update User</h3>
                </div>
                <button id="closeEditModalBtn" class="text-gray-400 hover:text-gray-600">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <form id="editUserForm" class="p-5 space-y-4">
                <input type="hidden" id="editUserId">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text" id="editName" 
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all"
                           placeholder="Enter full name">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="editEmail" 
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all"
                           placeholder="user@example.com">
                </div>
                <div class="flex justify-end gap-3 pt-3">
                    <button type="button" id="cancelEditBtn" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                        Cancel
                    </button>
                    <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-orange-600 rounded-lg hover:bg-orange-700 transition-colors">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();
        
        // Re-initialize icons after DOM updates
        function refreshIcons() {
            lucide.createIcons();
        }
        
        // Toast notification
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-green-600' : (type === 'error' ? 'bg-red-600' : 'bg-gray-800');
            const icon = type === 'success' ? 'check-circle' : (type === 'error' ? 'alert-circle' : 'info');
            
            toast.className = `${bgColor} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 text-sm transform transition-all duration-300`;
            toast.innerHTML = `
                <i data-lucide="${icon}" class="w-4 h-4"></i>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            refreshIcons();
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(10px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        const API_BASE = '';
        
        async function apiRequest(endpoint, method, body = null) {
            const options = {
                method,
                headers: { 'Content-Type': 'application/json' },
            };
            if (body) options.body = JSON.stringify(body);
            
            const response = await fetch(`${API_BASE}${endpoint}`, options);
            if (!response.ok) {
                const error = await response.text();
                throw new Error(error || `HTTP ${response.status}`);
            }
            return method === 'DELETE' ? { success: true } : await response.json();
        }
        
        async function loadUsers() {
            try {
                const users = await apiRequest('/users/', 'GET');
                renderTable(users);
                updateStats(users);
                document.getElementById('lastUpdatedTimestamp').innerText = new Date().toLocaleTimeString();
                document.getElementById('userCountBadge').innerText = `${users.length} user${users.length !== 1 ? 's' : ''}`;
                refreshIcons();
            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('usersTableBody').innerHTML = `
                    <tr>
                        <td colspan="4" class="px-6 py-12 text-center">
                            <div class="flex flex-col items-center gap-2">
                                <i data-lucide="database" class="w-8 h-8 text-red-400"></i>
                                <p class="text-sm text-red-500">Failed to load users. Make sure the server is running.</p>
                                <p class="text-xs text-gray-400">http://localhost:8000</p>
                            </div>
                        </td>
                    </tr>
                `;
                refreshIcons();
            }
        }
        
        function updateStats(users) {
            document.getElementById('totalUsersCount').innerText = users.length;
        }
        
        function renderTable(users) {
            const tbody = document.getElementById('usersTableBody');
            
            if (users.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" class="px-6 py-12 text-center">
                            <div class="flex flex-col items-center gap-2">
                                <i data-lucide="inbox" class="w-8 h-8 text-gray-400"></i>
                                <p class="text-sm text-gray-500">No users found</p>
                                <p class="text-xs text-gray-400">Click "Add User" to create one</p>
                            </div>
                        </td>
                    </tr>
                `;
                refreshIcons();
                return;
            }
            
            tbody.innerHTML = users.map(user => `
                <tr class="table-row-hover">
                    <td class="px-6 py-4 text-sm font-mono text-gray-600">${user.id}</td>
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center">
                                <span class="text-sm font-medium text-blue-600">${user.name.charAt(0).toUpperCase()}</span>
                            </div>
                            <span class="text-sm font-medium text-gray-900">${escapeHtml(user.name)}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-600">${escapeHtml(user.email)}</td>
                    <td class="px-6 py-4 text-right">
                        <div class="flex justify-end gap-2">
                            <button onclick='editUser(${JSON.stringify(user)})' class="text-gray-500 hover:text-blue-600 transition-colors p-1">
                                <i data-lucide="edit-2" class="w-4 h-4"></i>
                            </button>
                            <button onclick='deleteUser(${user.id})' class="text-gray-500 hover:text-red-600 transition-colors p-1">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
            refreshIcons();
        }
        
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        
        async function createUser(name, email) {
            try {
                await apiRequest('/users/', 'POST', { name, email });
                showToast('User created successfully', 'success');
                await loadUsers();
                closeCreateModal();
            } catch (error) {
                showToast(`Failed to create user: ${error.message}`, 'error');
            }
        }
        
        async function updateUser(id, name, email) {
            try {
                const payload = {};
                if (name) payload.name = name;
                if (email) payload.email = email;
                await apiRequest(`/users/${id}`, 'PUT', payload);
                showToast('User updated successfully', 'success');
                await loadUsers();
                closeEditModal();
            } catch (error) {
                showToast(`Failed to update user: ${error.message}`, 'error');
            }
        }
        
        async function deleteUser(id) {
            if (!confirm('Are you sure you want to delete this user?')) return;
            try {
                await apiRequest(`/users/${id}`, 'DELETE');
                showToast('User deleted successfully', 'success');
                await loadUsers();
            } catch (error) {
                showToast(`Failed to delete user: ${error.message}`, 'error');
            }
        }
        
        // Global functions for button callbacks
        window.editUser = (user) => {
            document.getElementById('editUserId').value = user.id;
            document.getElementById('editName').value = user.name;
            document.getElementById('editEmail').value = user.email;
            document.getElementById('editModal').classList.remove('hidden');
        };
        
        window.deleteUser = deleteUser;
        
        // Modal controls
        function openCreateModal() {
            document.getElementById('createModal').classList.remove('hidden');
        }
        
        function closeCreateModal() {
            document.getElementById('createModal').classList.add('hidden');
            document.getElementById('createUserForm').reset();
        }
        
        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
            document.getElementById('editUserForm').reset();
        }
        
        // Event listeners
        document.getElementById('openCreateModalBtn').addEventListener('click', openCreateModal);
        document.getElementById('closeCreateModalBtn').addEventListener('click', closeCreateModal);
        document.getElementById('cancelCreateBtn').addEventListener('click', closeCreateModal);
        document.getElementById('closeEditModalBtn').addEventListener('click', closeEditModal);
        document.getElementById('cancelEditBtn').addEventListener('click', closeEditModal);
        document.getElementById('refreshBtn').addEventListener('click', () => loadUsers());
        
        // Form submissions
        document.getElementById('createUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('createName').value.trim();
            const email = document.getElementById('createEmail').value.trim();
            if (!name || !email) {
                showToast('Please fill in all fields', 'error');
                return;
            }
            await createUser(name, email);
        });
        
        document.getElementById('editUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = parseInt(document.getElementById('editUserId').value);
            const name = document.getElementById('editName').value.trim();
            const email = document.getElementById('editEmail').value.trim();
            if (!name && !email) {
                showToast('Please update at least one field', 'error');
                return;
            }
            await updateUser(id, name, email);
        });
        
        // Close modals on outside click
        window.addEventListener('click', (e) => {
            const createModal = document.getElementById('createModal');
            const editModal = document.getElementById('editModal');
            if (e.target === createModal) closeCreateModal();
            if (e.target === editModal) closeEditModal();
        });
        
        // Initial load
        loadUsers();
    </script>
</body>
</html>
